name: Release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on:
      windows-latest # For a list of available runner types, refer to
      # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: ffxiv-vr # Replace with your solution name, i.e. MyWpfApp.sln.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the .NET Core workload
      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.101
      # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Setup windows sdk
        uses: GuillaumeFalourd/setup-windows10-sdk-action@v2.4
        with:
          sdk-version: 22621

      - name: Bump Version
        id: bump_version
        run: powershell release/bump-version.ps1

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Format Check
        run: |
          dotnet format --verify-no-changes
      - name: Build
        run: |
          dotnet build --configuration Release --nologo

      - name: Test
        run: dotnet test

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest
          path: .\FfxivVr\bin\x64\latest.zip
          if-no-files-found: error

      - name: Finalize Release
        id: finalize_release
        run: |
          powershell release/finalize-release.ps1 ${{ steps.bump_version.outputs.VERSION_STRING }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.bump_version.outputs.VERSION_STRING }}
          release_name: FFXIV VR ${{ steps.bump_version.outputs.VERSION_STRING }}
          body_path: release/changelog.txt
          draft: false
          prerelease: false
      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: .\FfxivVr\bin\x64\latest.zip
          asset_name: FfxivVR.zip
          asset_content_type: application/zip
      - name: Push Release to Github
        run: |
          git push origin master
